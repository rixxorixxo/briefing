<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Briefing">
<title>Morning Briefing</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, system-ui, sans-serif; background: #fafaf8; color: #111; padding: 24px 16px 48px; max-width: 600px; margin: 0 auto; }
  .header { display: flex; justify-content: space-between; align-items: flex-start; padding-bottom: 14px; border-bottom: 1.5px solid #111; margin-bottom: 24px; }
  .header-left p { margin: 0; }
  .label { font-family: monospace; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: #888; margin-bottom: 4px !important; }
  .title { font-size: 20px; font-weight: 500; margin-bottom: 2px !important; }
  .date { font-size: 13px; color: #666; }
  #refresh-btn { font-family: monospace; font-size: 11px; padding: 7px 12px; background: transparent; border: 0.5px solid #ccc; border-radius: 6px; cursor: pointer; margin-top: 4px; }
  #refresh-btn:disabled { opacity: 0.4; }
  .section { margin-bottom: 28px; }
  .sec-head { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .sec-label { font-family: monospace; font-size: 10px; letter-spacing: 0.13em; text-transform: uppercase; color: #888; white-space: nowrap; }
  .sec-line { flex: 1; height: 0.5px; background: #e0e0e0; }
  .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .grid-3-resp { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .card { background: #fff; border: 0.5px solid #e4e4e4; border-radius: 10px; padding: 14px; }
  .card-label { font-family: monospace; font-size: 10px; color: #888; margin-bottom: 5px; letter-spacing: 0.06em; }
  .card-value { font-family: monospace; font-weight: 500; margin-bottom: 8px; letter-spacing: -0.02em; }
  .badge { font-family: monospace; font-size: 10px; font-weight: 500; padding: 2px 7px; border-radius: 4px; display: inline-block; }
  .btc-row { display: flex; justify-content: space-between; align-items: center; }
  .btc-symbol { font-size: 36px; opacity: 0.12; }
  .news-item { padding: 13px 0; border-bottom: 0.5px solid #ebebeb; }
  .news-item:last-child { border-bottom: none; }
  .news-source { font-family: monospace; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: #888; margin-bottom: 4px; }
  .news-headline { font-size: 14px; font-weight: 500; line-height: 1.4; margin-bottom: 4px; }
  .news-summary { font-size: 12px; color: #555; line-height: 1.5; }
  #loading { display: flex; flex-direction: column; align-items: center; padding: 60px 0; gap: 14px; }
  .spinner { width: 24px; height: 24px; border: 1.5px solid #e0e0e0; border-top-color: #111; border-radius: 50%; animation: spin 0.85s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading-msg { font-family: monospace; font-size: 11px; color: #888; letter-spacing: 0.07em; }
  #error { display: none; padding: 40px 0; text-align: center; }
  #error-msg { font-family: monospace; font-size: 12px; color: #c0392b; margin-bottom: 10px; }
  #error-detail { font-family: monospace; font-size: 10px; color: #888; background: #f5f5f5; padding: 10px; border-radius: 6px; text-align: left; white-space: pre-wrap; word-break: break-all; margin-bottom: 16px; display: none; }
  #retry-btn { font-family: monospace; font-size: 11px; padding: 8px 16px; background: #111; color: #fff; border: none; border-radius: 5px; cursor: pointer; }
  #content { display: none; }
  @media (max-width: 360px) {
    .grid-3, .grid-3-resp { grid-template-columns: repeat(2, 1fr); }
    .card-value { font-size: 17px !important; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <p class="label">Daily Financial Briefing</p>
    <p class="title">Morning Update</p>
    <p class="date" id="date-str"></p>
  </div>
  <button id="refresh-btn" onclick="loadBriefing()">↺ Refresh</button>
</div>

<div id="loading">
  <div class="spinner"></div>
  <p id="loading-msg">Scanning markets…</p>
</div>

<div id="error">
  <p id="error-msg">Could not load data.</p>
  <pre id="error-detail"></pre>
  <button id="retry-btn" onclick="loadBriefing()">Try again</button>
</div>

<div id="content">

  <div class="section">
    <div class="sec-head"><span class="sec-label">FX Rates</span><span class="sec-line"></span></div>
    <div class="grid-3">
      <div class="card" id="czk-eur"></div>
      <div class="card" id="czk-usd"></div>
      <div class="card" id="czk-gbp"></div>
    </div>
  </div>

  <div class="section">
    <div class="sec-head"><span class="sec-label">Crypto</span><span class="sec-line"></span></div>
    <div class="card" id="btc-card"></div>
  </div>

  <div class="section">
    <div class="sec-head"><span class="sec-label">Indices</span><span class="sec-line"></span></div>
    <div class="grid-3-resp" id="indices-grid"></div>
  </div>

  <div class="section">
    <div class="sec-head"><span class="sec-label">Headlines</span><span class="sec-line"></span></div>
    <div id="news-list"></div>
  </div>

</div>

<script>
const MSGS = ["Scanning markets…","Checking CZK rates…","Reading the headlines…","Almost ready…"];
let msgT = null;

document.getElementById("date-str").textContent = new Date().toLocaleDateString("cs-CZ", {
  weekday: "long", year: "numeric", month: "long", day: "numeric"
});

const SYS = `You are a financial data assistant. Search the web for current values and respond with ONLY a raw JSON object — no prose, no markdown fences, nothing else.

Use this exact structure:
{
  "fx": {
    "czk_eur": { "rate": 25.12, "change": -0.05, "change_pct": -0.20 },
    "czk_usd": { "rate": 23.45, "change": 0.10, "change_pct": 0.43 },
    "czk_gbp": { "rate": 29.80, "change": 0.08, "change_pct": 0.27 }
  },
  "crypto": {
    "btc": { "price": 95000, "change_24h": 1200, "change_pct_24h": 1.28 }
  },
  "indices": {
    "sp500": { "label": "S&P 500", "value": 5300, "change": 25, "change_pct": 0.47 },
    "dax": { "label": "DAX", "value": 18500, "change": -50, "change_pct": -0.27 },
    "px": { "label": "PX Index", "value": 1620, "change": 8, "change_pct": 0.50 }
  },
  "news": [
    { "headline": "...", "source": "...", "summary": "One sentence." },
    { "headline": "...", "source": "...", "summary": "..." },
    { "headline": "...", "source": "...", "summary": "..." },
    { "headline": "...", "source": "...", "summary": "..." }
  ]
}

All values are numbers. rate = CZK per 1 foreign unit. change = absolute daily change. change_pct = % as a number (e.g. -0.20). Search: "CZK EUR USD GBP exchange rate today", "Bitcoin price today", "S&P 500 DAX PX Prague index today", "major financial news today".`;

function extractJSON(text) {
  try { return JSON.parse(text.trim()); } catch {}
  const s = text.replace(/^```(?:json)?\s*/i,"").replace(/\s*```$/,"").trim();
  try { return JSON.parse(s); } catch {}
  const m = text.match(/\{[\s\S]*\}/);
  if (m) { try { return JSON.parse(m[0]); } catch {} }
  return null;
}

const cc = v => v >= 0 ? "#1a7a4a" : "#c0392b";
const cb = v => v >= 0 ? "#f0faf5" : "#fef5f5";
const fmt = (v, p, d=2) => { const s = v>=0?"+":""; return `${s}${Number(v).toFixed(d)} (${s}${Number(p).toFixed(2)}%)`; };

function badge(v, p, d=2, suffix="") {
  return `<span class="badge" style="color:${cc(v)};background:${cb(v)};">${fmt(v,p,d)}${suffix}</span>`;
}

function rateCard(el, pair, r, ch, pct, dec) {
  el.innerHTML = `<p class="card-label">${pair}</p>
<p class="card-value" style="font-size:20px;">${Number(r).toFixed(dec)}</p>
${badge(ch, pct, dec)}`;
}

function showLoading(on) {
  document.getElementById("loading").style.display = on ? "flex" : "none";
  if (on) {
    let i = 0;
    document.getElementById("loading-msg").textContent = MSGS[0];
    msgT = setInterval(() => { i=(i+1)%MSGS.length; document.getElementById("loading-msg").textContent=MSGS[i]; }, 2200);
  } else { clearInterval(msgT); }
}

function showError(msg, detail="") {
  showLoading(false);
  document.getElementById("content").style.display = "none";
  document.getElementById("error").style.display = "block";
  document.getElementById("error-msg").textContent = msg;
  const d = document.getElementById("error-detail");
  if (detail) { d.textContent = detail.slice(0,500); d.style.display="block"; }
  document.getElementById("refresh-btn").disabled = false;
}

async function loadBriefing() {
  document.getElementById("error").style.display = "none";
  document.getElementById("content").style.display = "none";
  document.getElementById("refresh-btn").disabled = true;
  showLoading(true);

  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "anthropic-dangerous-direct-browser-access": "true"
      },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        system: SYS,
        tools: [{ type: "web_search_20250305", name: "web_search" }],
        messages: [{ role: "user", content: "Fetch today's complete financial briefing data. Respond only with the JSON object." }]
      })
    });

    if (!res.ok) { const b = await res.text(); throw new Error(`API ${res.status}: ${b.slice(0,300)}`); }

    const result = await res.json();
    const raw = (result.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("").trim();
    if (!raw) throw new Error(`Empty response. stop_reason: ${result.stop_reason}`);

    const data = extractJSON(raw);
    if (!data) throw new Error(`JSON parse failed.\n${raw.slice(0,400)}`);

    // FX
    rateCard(document.getElementById("czk-eur"), "CZK / EUR", data.fx.czk_eur.rate, data.fx.czk_eur.change, data.fx.czk_eur.change_pct, 3);
    rateCard(document.getElementById("czk-usd"), "CZK / USD", data.fx.czk_usd.rate, data.fx.czk_usd.change, data.fx.czk_usd.change_pct, 3);
    rateCard(document.getElementById("czk-gbp"), "CZK / GBP", data.fx.czk_gbp.rate, data.fx.czk_gbp.change, data.fx.czk_gbp.change_pct, 3);

    // BTC
    const b = data.crypto.btc;
    document.getElementById("btc-card").innerHTML = `<div class="btc-row">
<div>
<p class="card-label">BTC / USD</p>
<p class="card-value" style="font-size:28px;">$${Number(b.price).toLocaleString("en-US",{maximumFractionDigits:0})}</p>
${badge(b.change_24h, b.change_pct_24h, 0, " · 24 h")}
</div>
<span class="btc-symbol">₿</span>
</div>`;

    // Indices
    const g = document.getElementById("indices-grid"); g.innerHTML="";
    Object.values(data.indices).forEach(idx => {
      const el = document.createElement("div"); el.className="card";
      el.innerHTML=`<p style="font-size:11px;color:#888;margin-bottom:5px;font-weight:500;">${idx.label}</p>
<p class="card-value" style="font-size:18px;">${Number(idx.value).toLocaleString("en-US",{maximumFractionDigits:0})}</p>
${badge(idx.change, idx.change_pct, 2)}`;
      g.appendChild(el);
    });

    // News
    document.getElementById("news-list").innerHTML = data.news.map(item=>`<div class="news-item">
<p class="news-source">${item.source}</p>
<p class="news-headline">${item.headline}</p>
<p class="news-summary">${item.summary}</p>
</div>`).join("");

    showLoading(false);
    document.getElementById("content").style.display = "block";

  } catch(e) {
    showError("Could not load data.", e.message);
  } finally {
    document.getElementById("refresh-btn").disabled = false;
  }
}

loadBriefing();
</script>
</body>
</html>
